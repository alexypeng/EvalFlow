services:
    postgres:
        image: postgres:16
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: evalflow
        ports:
            - "5432:5432"
        volumes:
            - evalflow_postgres:/var/lib/postgresql/data

    api:
        build:
            context: .
            dockerfile: server/Dockerfile
        environment:
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/evalflow
            GEMINI_API_KEY:
            LLM_PROVIDER: mock
            PORT: 3000
        ports:
            - "3000:3000"
        depends_on:
            - postgres
        command:
            ["sh", "-c", "pnpm exec prisma migrate deploy && pnpm start:api"]
    worker:
        build:
            context: .
            dockerfile: server/Dockerfile
        environment:
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/evalflow
            GEMINI_API_KEY:
            LLM_PROVIDER: mock
        depends_on:
            - postgres
        command:
            ["sh", "-c", "pnpm exec prisma migrate deploy && pnpm start:worker"]

    frontend:
        build:
            context: .
            dockerfile: frontend/Dockerfile
        environment:
            VITE_API_URL: http://localhost:3000
        ports:
            - "5173:5173"
        depends_on:
            - api

volumes:
    evalflow_postgres:
